<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAU Monsters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Left side - Signup Form */
        .signup-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0e0e0;
            padding: 40px;
        }

        .signup-container {
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .signup-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        button {
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            margin-top: 0;
        }

        button:hover {
            background-color: #45a049;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            color: red;
            font-size: 14px;
        }

        .password-toggle {
            display: flex;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .password-toggle input[type="checkbox"] {
            margin-right: 8px;
            width: 16px;
            height: 16px;
        }

        .password-toggle label {
            color: #555;
            cursor: pointer;
        }

        .signin-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .signin-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 500;
        }

        .signin-link a:hover {
            text-decoration: underline;
        }

        /* Right side - Welcome Section */
        .welcome-section {
            flex: 1;
            background: linear-gradient( #317940 0%, #103315 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
            text-align: center;
        }

        .welcome-content {
            max-width: 400px;
        }

        .welcome-section h1 {
            font-size: 42px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .welcome-section p {
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
            opacity: 0.95;
        }

        .image-placeholder {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .signup-section,
            .welcome-section {
                flex: 1;
                padding: 20px;
            }

            .welcome-section {
                padding: 30px 20px;
            }

            .welcome-section h1 {
                font-size: 32px;
            }

            .welcome-section p {
                font-size: 16px;
            }

            .image-placeholder {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left side - Forms -->
        <div class="signup-section">
            <div class="signup-container">

                <!-- Sign Up Form -->
                <div id="signupView">
                    <h2>Sign Up</h2>
                    <form id="signupForm">
                        <label for="player_name">Player Name:</label>
                        <input type="text" id="player_name" name="player_name" placeholder="Enter your player name" required>

                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" placeholder="Choose a username" required>

                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>

                        <div class="password-toggle">
                            <input type="checkbox" id="show_password">
                            <label for="show_password">Show Password</label>
                        </div>

                        <button type="submit">Sign Up</button>
                    </form>
                    <div class="signin-link">
                        <p>Already have an account? <a href="#" id="goToLogin">Sign in</a></p>
                    </div>
                    <div id="signupMessage" class="message"></div>
                </div>

                <!-- Login Form -->
                <div id="loginView" style="display:none;">
                    <h2>Sign In</h2>
                    <form id="loginForm">
                        <label for="login_username">Username:</label>
                        <input type="text" id="login_username" name="login_username" placeholder="Enter your username" required>

                        <label for="login_password">Password:</label>
                        <input type="password" id="login_password" name="login_password" placeholder="Enter your password" required>

                        <div class="password-toggle">
                            <input type="checkbox" id="show_login_password">
                            <label for="show_login_password">Show Password</label>
                        </div>

                        <button type="submit">Sign In</button>
                    </form>
                    <div class="signin-link">
                        <p>Don't have an account? <a href="#" id="goToSignup">Sign up</a></p>
                    </div>
                    <div id="loginMessage" class="message"></div>
                </div>

            </div>
        </div>

        <!-- Right side - Welcome Message and Image -->
        <div class="welcome-section">
            <div class="welcome-content">
                <div class="image-placeholder">
                    <img src="https://pokemonrevolution.net/forum/uploads/monthly_2020_06/squirtle.jpg.48410274429bc0b5b95ad5741650692c.jpg">
                </div>
                <h1>Welcome to HAU Monsters</h1>
                <p>Catch, train, and battle monsters. Join the adventure today!</p>
            </div>
        </div>
    </div>

    <script>
        // Toggle between forms
        document.getElementById('goToLogin').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('signupView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('signupMessage').textContent = '';
        });

        document.getElementById('goToSignup').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('signupView').style.display = 'block';
            document.getElementById('loginMessage').textContent = '';
        });

        // Show/Hide Password - Signup
        document.getElementById('show_password').addEventListener('change', function() {
            document.getElementById('password').type = this.checked ? 'text' : 'password';
        });

        // Show/Hide Password - Login
        document.getElementById('show_login_password').addEventListener('change', function() {
            document.getElementById('login_password').type = this.checked ? 'text' : 'password';
        });

        // Signup Submission
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const playerName = document.getElementById('player_name').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msgEl = document.getElementById('signupMessage');

            if (!playerName || !username || !password) {
                msgEl.style.color = 'red';
                msgEl.textContent = 'All fields are required.';
                return;
            }
            if (password.length < 6) {
                msgEl.style.color = 'red';
                msgEl.textContent = 'Password must be at least 6 characters.';
                return;
            }

            try {
                const checkRes = await fetch('/api/auth/check-username', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const checkResult = await checkRes.json();
                if (!checkResult.available) {
                    msgEl.style.color = 'red';
                    msgEl.textContent = checkResult.message;
                    return;
                }
            } catch {
                msgEl.style.color = 'red';
                msgEl.textContent = 'Error checking username availability.';
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_name: playerName, username, password })
                });
                const result = await res.json();
                msgEl.style.color = result.success ? 'green' : 'red';
                msgEl.textContent = result.message;
                if (result.success) document.getElementById('signupForm').reset();
            } catch {
                msgEl.style.color = 'red';
                msgEl.textContent = 'An error occurred. Please try again.';
            }
        });

        // Login Submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('login_username').value.trim();
            const password = document.getElementById('login_password').value;
            const msgEl = document.getElementById('loginMessage');

            if (!username || !password) {
                msgEl.style.color = 'red';
                msgEl.textContent = 'All fields are required.';
                return;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await res.json();
                if (result.success) {
                    sessionStorage.setItem('user', JSON.stringify(result.data));
                    window.location.href = '/dashboard.html';
                } else {
                    msgEl.style.color = 'red';
                    msgEl.textContent = result.message;
                }
            } catch {
                msgEl.style.color = 'red';
                msgEl.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
